name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: 'false'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - run: pip install -r requirements.txt
    
    - name: Run analysis
      env:
        # AI 配置
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        # 数据源配置
        REALTIME_SOURCE_PRIORITY: "tencent,akshare_sina,efinance,akshare_em"
        ENABLE_REALTIME_QUOTE: "true"
        # 飞书配置（让 main.py 也能读取）
        FEISHU_WEBHOOK_URL: "https://open.feishu.cn/open-apis/bot/v2/hook/placeholder"
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_USER_ID: ${{ secrets.FEISHU_USER_ID }}
      run: |
        echo "=== 环境变量检查 ==="
        echo "STOCK_LIST: $STOCK_LIST"
        echo "OPENAI_MODEL: $OPENAI_MODEL"
        echo "FEISHU_APP_ID: ${FEISHU_APP_ID:0:8}..."
        
        if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
          echo "=== 强制执行模式 ==="
          python main.py --force-run
        else
          python main.py
        fi
        
        echo "=== 检查生成的文件 ==="
        echo "当前目录:"
        ls -la
        echo ""
        echo "查找报告文件:"
        find . -name "*.md" -type f 2>/dev/null | head -10
        echo ""
        echo "查找日志文件:"
        find logs/ -name "*.log" 2>/dev/null | head -5 || echo "无日志目录"
    
    - name: Generate simple report if missing
      if: always()
      run: |
        # 如果 main.py 没有生成报告，我们手动生成一个
        if [ ! -f report_*.md ]; then
          echo "⚠️ 未找到报告文件，生成简化版报告..."
          cat > report_manual.md << EOF
# 📊 股票分析报告 - $(date +%Y-%m-%d)

## 分析股票
${{ secrets.STOCK_LIST }}

## 状态
- ⏰ 分析时间: $(date)
- 🔧 运行模式: GitHub Actions
- ⚠️ 注意: 原分析程序未生成报告，此为简化版

## 请检查
1. 查看详细日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
2. 检查 Kimi API 是否正常
3. 检查数据源是否可用
EOF
          echo "✅ 已生成简化报告"
        fi
    
    - name: Send report to Feishu
      if: always()
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_USER_ID: ${{ secrets.FEISHU_USER_ID }}
      run: |
        python3 << 'PYTHON_SCRIPT'
        import os
        import json
        import requests
        import glob
        
        app_id = os.getenv('FEISHU_APP_ID')
        app_secret = os.getenv('FEISHU_APP_SECRET')
        user_id = os.getenv('FEISHU_USER_ID')
        
        if not all([app_id, app_secret, user_id]):
            print("⚠️ 飞书配置不完整")
            exit(0)
        
        def get_token():
            url = "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal/"
            resp = requests.post(url, json={"app_id": app_id, "app_secret": app_secret}, timeout=10)
            data = resp.json()
            if data.get('code') == 0:
                return data['tenant_access_token']
            print(f"❌ 获取token失败: {data}")
            return None
        
        def send_message(token, user_id, text):
            url = "https://open.feishu.cn/open-apis/im/v1/messages"
            headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
            params = {"receive_id_type": "open_id"}
            payload = {
                "receive_id": user_id,
                "msg_type": "text",
                "content": json.dumps({"text": text[:4000]})
            }
            resp = requests.post(url, headers=headers, params=params, json=payload, timeout=10)
            result = resp.json()
            if result.get('code') == 0:
                print("✅ 消息发送成功")
            else:
                print(f"❌ 发送失败: {result}")
        
        # 查找报告文件（包括手动生成的）
        report_files = glob.glob('*.md')
        report_files = [f for f in report_files if 'report' in f.lower()]
        
        if report_files:
            print(f"📄 找到报告: {report_files}")
            with open(report_files[0], 'r', encoding='utf-8') as f:
                content = f.read()
            
            token = get_token()
            if token:
                chunks = [content[i:i+3500] for i in range(0, len(content), 3500)]
                for i, chunk in enumerate(chunks):
                    header = f"📊 股票分析报告 ({i+1}/{len(chunks)})\n\n" if len(chunks) > 1 else "📊 股票分析报告\n\n"
                    send_message(token, user_id, header + chunk)
        else:
            print("⚠️ 未找到任何报告文件")
        PYTHON_SCRIPT
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analysis-logs
        path: |
          logs/
          *.md
        retention-days: 7
