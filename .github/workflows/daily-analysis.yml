name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: 'false'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - run: pip install -r requirements.txt
    
    - name: Run analysis
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        REALTIME_SOURCE_PRIORITY: "tencent,akshare_sina,efinance,akshare_em"
        ENABLE_REALTIME_QUOTE: "true"
      run: |
        if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
          echo "强制执行模式..."
          python main.py --force-run 2>&1 | tee analysis.log || true
        else
          python main.py 2>&1 | tee analysis.log || true
        fi
        
        # 查找并显示报告文件
        echo "=== 查找报告文件 ==="
        find . -name "report_*.md" -type f 2>/dev/null | head -5
        ls -la report_*.md 2>/dev/null || echo "未找到报告文件"
        
        # 查找日志文件
        echo "=== 查找日志文件 ==="
        find logs/ -name "*.log" -type f 2>/dev/null | head -5 || echo "无日志目录"
    
    - name: Upload analysis log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analysis-logs
        path: |
          analysis.log
          logs/*.log
          report_*.md
        retention-days: 7
