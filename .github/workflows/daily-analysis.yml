name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: 'false'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - run: pip install -r requirements.txt
    
    - name: Run analysis
      env:
        # AI 配置（从 Secrets 读取）
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        # 股票列表
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        # 数据源配置
        REALTIME_SOURCE_PRIORITY: "tencent,akshare_sina,efinance,akshare_em"
        ENABLE_REALTIME_QUOTE: "true"
        # 飞书配置
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_USER_ID: ${{ secrets.FEISHU_USER_ID }}
      run: |
        echo "=== 股票分析系统启动 ==="
        echo "AI模型: ${{ secrets.OPENAI_MODEL }}"
        echo "股票列表: ${{ secrets.STOCK_LIST }}"
        
        if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
          echo "=== 强制执行模式 ==="
          python main.py --force-run 2>&1 | tee analysis.log || true
        else
          python main.py 2>&1 | tee analysis.log || true
        fi
        
        echo "=== 检查报告文件 ==="
        ls -la *.md 2>/dev/null || echo "未找到 .md 文件"
        find . -name "*.md" -type f 2>/dev/null | head -5
    
    - name: Send report to Feishu
      if: always()
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_USER_ID: ${{ secrets.FEISHU_USER_ID }}
      run: |
        python3 << 'EOF'
        import os, json, requests, glob
        
        app_id = os.getenv('FEISHU_APP_ID')
        app_secret = os.getenv('FEISHU_APP_SECRET')
        user_id = os.getenv('FEISHU_USER_ID')
        
        if not all([app_id, app_secret, user_id]):
            print("⚠️ 飞书配置不完整")
            exit(0)
        
        def get_token():
            url = "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal/"
            resp = requests.post(url, json={"app_id": app_id, "app_secret": app_secret}, timeout=10)
            data = resp.json()
            return data.get('tenant_access_token') if data.get('code') == 0 else None
        
        def send_message(token, user_id, text):
            url = "https://open.feishu.cn/open-apis/im/v1/messages"
            headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
            params = {"receive_id_type": "open_id"}
            payload = {"receive_id": user_id, "msg_type": "text", "content": json.dumps({"text": text[:4000]})}
            resp = requests.post(url, headers=headers, params=params, json=payload, timeout=10)
            return resp.json()
        
        # 查找并发送报告
        reports = [f for f in glob.glob('*.md') if 'report' in f.lower()]
        if reports:
            print(f"📄 发送报告: {reports[0]}")
            with open(reports[0], 'r') as f:
                content = f.read()
            token = get_token()
            if token:
                for i in range(0, len(content), 3500):
                    chunk = content[i:i+3500]
                    header = f"📊 股票分析报告 ({i//3500+1}/{(len(content)-1)//3500+1})\n\n"
                    send_message(token, user_id, header + chunk)
        else:
            print("⚠️ 未找到报告文件")
        EOF
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analysis-logs
        path: |
          logs/
          *.md
          analysis.log
        retention-days: 7
